<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Conference Room Display</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 800px;
      height: 480px;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: white;
      color: black;
    }

    .screen {
      width: 800px;
      height: 480px;
      display: grid;
      grid-template-columns: 600px 200px;
      grid-template-rows: 400px 80px;
      border: 1px solid #ddd;
    }

    .main {
      grid-column: 1;
      grid-row: 1;
      padding: 28px 55px;
      position: relative;
    }

    .room-title {
      font-size: 34px;
      font-weight: 400;
      margin: 0;
    }

    .status {
      font-size: 88px;
      font-weight: 800;
      margin-top: 120px;
      letter-spacing: -3px;
    }

    .current-booking {
      position: absolute;
      bottom: 28px;
      left: 55px;
      font-size: 18px;
      font-weight: 600;
    }

    .side {
      grid-column: 2;
      grid-row: 1 / 3;
      border-left: 3px solid #000;
      display: grid;
      grid-template-rows: 190px 290px;
    }

    .qr-box {
      padding: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-box img {
      width: 145px;
      height: 145px;
      object-fit: contain;
    }

    .tokens {
      background: #000;
      color: #fff;
      padding: 25px 38px;
      text-align: left;
    }

    .tokens h2 {
      font-size: 18px;
      margin: 0 0 30px 0;
      font-weight: 800;
    }

    .tokens p {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      margin: 0 0 22px 0;
    }

    .footer {
      grid-column: 1;
      grid-row: 2;
      background: #efefef;
      padding: 24px 55px;
      font-size: 16px;
      font-weight: 600;
    }

    .footer span {
      font-weight: 800;
    }
  </style>
</head>

<body>

  <div class="screen">

    <main class="main">
      <h1 class="room-title">Conference Room</h1>

      <div class="status">Available</div>

      <div class="current-booking">
        Panthion 11:00 am - 12:30 am
      </div>
    </main>

    <aside class="side">
      <div class="qr-box">
        <img 
          src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://example.com"
          alt="QR Code"
        >
      </div>

      <div class="tokens">
        <h2>WIFI TOKENS</h2>
        <p>03401-25817</p>
        <p>10797-18997</p>
        <p>80750-81337</p>
        <p>49350-33031</p>
      </div>
    </aside>

    <footer class="footer">
      <span>Next Meeting:</span> Roots & Shoots Thursday, Dec 14 2026 02.00 am - 15.30 pm
    </footer>

  </div>

</body>
</html>
